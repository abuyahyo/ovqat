<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>Бугун нима тайёрлаймиз? · Ошхона ёрдамчиси</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#8a6228">
<meta name="description" content="Уйингиздаги масаллиқларни айтинг — мен сизга мазали ўзбек ва жаҳон таомларини таклиф қилай.">

<meta property="og:type" content="website">
<meta property="og:site_name" content="Ошхона ёрдамчиси">
<meta property="og:title" content="Бугун нима тайёрлаймиз?">
<meta property="og:image" content="og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://abuyahyo.github.io/ovqat/">
<meta property="og:locale" content="uz_UZ">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Бугун нима тайёрлаймиз?">
<meta name="twitter:image" content="og-image.png">

<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Алифбо ўзгартиргич -->
<div class="script-toggle">
  <button id="btn-cyrillic" class="active" data-script="cyrillic">Кирилл</button>
  <button id="btn-latin" data-script="latin">Lotin</button>
</div>

<button class="favorites-toggle" id="favorites-open" aria-label="Sevimlilar">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>
  <span class="favorites-count" id="favorites-count">0</span>
</button>

<div class="container">

  <header class="header">
    <div class="ornament">
      <span class="line"></span>
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M16 4 L26 16 L16 28 L6 16 Z"/>
        <path d="M16 10 L22 16 L16 22 L10 16 Z" opacity="0.5"/>
      </svg>
      <span class="line"></span>
    </div>
    <h1 data-tr="title"></h1>
    <p data-tr="subtitle"></p>
  </header>

  <main class="main-card">
    
    <h2 class="section-title" data-tr="step-title"></h2>

    <div class="input-area">
      <div class="input-wrapper">
        <svg class="input-icon-search" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input 
          type="text" 
          id="ingredient-input" 
          data-tr-placeholder="input-placeholder"
          autocomplete="off"
        >
      </div>
      <button class="btn-add" id="btn-add-ingredient">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        <span data-tr="btn-add"></span>
      </button>
    </div>

    <div class="suggestions">
      <div class="suggestions-label" data-tr="quick-select"></div>
      <div class="suggestion-chips" id="suggestion-chips"></div>
    </div>

    <div class="ingredients-list" id="ingredients-list">
      <div class="empty-state" data-tr="empty-state"></div>
    </div>

    <div class="servings-row">
      <span class="servings-label" data-tr="servings-label"></span>
      <div class="servings-control">
        <button class="servings-btn" id="servings-minus" aria-label="-">−</button>
        <span class="servings-count" id="servings-count">4</span>
        <button class="servings-btn" id="servings-plus" aria-label="+">+</button>
      </div>
    </div>

    <button class="btn-cook" id="cook-btn" disabled>
      <span data-tr="btn-cook"></span>
    </button>

    <div id="error-box"></div>

    <div class="loading" id="loading">
      <div class="skeleton-grid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
      <p data-tr="loading"></p>
    </div>

    <div class="results" id="results">
      <div class="results-header">
        <div class="ornament">
          <span class="line"></span>
          <svg viewBox="0 0 32 32" fill="currentColor" style="color: var(--gold);">
            <circle cx="16" cy="16" r="4"/>
            <circle cx="16" cy="16" r="10" fill="none" stroke="currentColor" stroke-width="1"/>
          </svg>
          <span class="line"></span>
        </div>
        <h2 class="section-title" style="text-align: center; margin-bottom: 8px;" data-tr="results-title"></h2>
        <p style="color: var(--ink-soft); font-style: italic; font-family: 'Inter', sans-serif; font-size: 1.1rem;" data-tr="results-subtitle"></p>
      </div>
      <div class="recipes-grid" id="recipes-grid"></div>
    </div>

  </main>

</div>

<div class="modal-overlay" id="favorites-overlay">
  <div class="modal" id="favorites-content">
    <button class="modal-action modal-close" id="favorites-close-btn" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <h2 class="favorites-title" data-tr="favorites-title"></h2>
    <p class="favorites-subtitle" id="favorites-empty-msg" data-tr="favorites-empty"></p>
    <div class="favorites-list" id="favorites-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content">
    <button class="modal-action modal-share" id="modal-share-btn" aria-label="Share" hidden>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/>
        <circle cx="6" cy="12" r="3"/>
        <circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </button>
    <button class="modal-action modal-close" id="modal-close-btn" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="app.js" defer></script>

</body>
</html>
